name: Deploy (GitHub Pages)

# Builds the static SPA and publishes it to GitHub Pages.
#
# No external credentials are required: GitHub Pages is deployed with the
# built-in GITHUB_TOKEN (scoped to this repo, minted per run). There is no
# Cloudflare/AWS token to store or rotate.
#
# One-time setup (repo admin): Settings -> Pages -> Build and deployment ->
# Source = "GitHub Actions". Then trigger this workflow from the Actions tab.
#
# First run / verification: trigger MANUALLY (workflow_dispatch) with the
# custom_domain input EMPTY to verify on https://<org>.github.io/<repo>/ first.
# Once DNS for tronide.io points at GitHub Pages, every push to `main` (e.g. a
# sync-to-github mirror commit) auto-deploys and serves tronide.io at the apex
# with an auto-provisioned Let's Encrypt certificate. A manual run can still
# override the domain via the custom_domain input (empty = the github.io URL).
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      custom_domain:
        description: Custom domain (manual runs only; empty = github.io URL). Pushes to main always serve tronide.io.
        type: string
        default: ''

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.2
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # build.sh runs the production nx build (baseHref "./", path-agnostic) and
      # normalises index.html. Output: build/apps/remix-ide.
      - name: Build
        env:
          NODE_OPTIONS: --max-old-space-size=6144
        run: bash build.sh

      # Pages serves a CNAME file as the custom domain. A push to main always
      # serves tronide.io; a manual run uses the custom_domain input (empty =
      # no CNAME, i.e. the github.io URL for verification). Value is passed via
      # env and quoted in the shell (no direct interpolation into run:).
      - name: Set custom domain
        env:
          CUSTOM_DOMAIN: ${{ github.event_name == 'push' && 'tronide.io' || inputs.custom_domain }}
        run: |
          if [ -n "$CUSTOM_DOMAIN" ]; then echo "$CUSTOM_DOMAIN" > build/apps/remix-ide/CNAME; fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/apps/remix-ide

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
